name: Daily Menu Sync

on:
  schedule:
    - cron: "0 7 * * *"    # 2:00 AM ET  — menu sync only (no notifications)
    - cron: "25 11 * * *"  # 7:25 AM EDT — breakfast notifications (8:25 AM EST)
    - cron: "55 14 * * *"  # 10:55 AM EDT — lunch notifications (11:55 AM EST)
    - cron: "55 20 * * *"  # 4:55 PM EDT  — dinner notifications (5:55 PM EST)
  workflow_dispatch: # allows manual trigger from the GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          APNS_KEY_ID: ${{ secrets.APNS_KEY_ID }}
          APNS_TEAM_ID: ${{ secrets.APNS_TEAM_ID }}
          APNS_BUNDLE_ID: ${{ secrets.APNS_BUNDLE_ID }}
          APNS_PRIVATE_KEY: ${{ secrets.APNS_PRIVATE_KEY }}
