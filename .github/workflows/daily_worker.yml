name: Daily Menu Sync

on:
  schedule:
    - cron: "0 7 * * *"  # 2:00 AM ET — menu sync only, no notifications
  workflow_dispatch:
    inputs:
      force_notify:
        description: "Send notifications regardless of current time (used by cron-job.org)"
        required: false
        default: "false"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # FORCE_NOTIFY: only set for workflow_dispatch (cron-job.org meal runs).
      # On `schedule` (2 AM sync), github.event.inputs is null — referencing
      # .force_notify directly used to leave FORCE_NOTIFY unset or break eval.
      - name: Run worker
        run: python worker.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          APNS_KEY_ID: ${{ secrets.APNS_KEY_ID }}
          APNS_TEAM_ID: ${{ secrets.APNS_TEAM_ID }}
          APNS_BUNDLE_ID: ${{ secrets.APNS_BUNDLE_ID }}
          APNS_PRIVATE_KEY: ${{ secrets.APNS_PRIVATE_KEY }}
          FORCE_NOTIFY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_notify || 'false' }}
